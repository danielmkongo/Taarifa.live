version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: taarifa_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-taarifa}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-taarifa}
    volumes:
      - mongo_data:/data/db
      - ./migrations/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + sessions + queues) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taarifa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MQTT Broker (Mosquitto) ────────────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    container_name: taarifa_mqtt
    restart: unless-stopped
    volumes:
      - ./mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt-broker/passwd:/mosquitto/config/passwd:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    container_name: taarifa_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://${MONGO_USERNAME:-taarifa}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-taarifa}?authSource=admin
      MONGO_DB: ${MONGO_DB:-taarifa}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MQTT_URL: mqtt://mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@taarifa.live}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      WEATHER_API_URL: ${WEATHER_API_URL:-https://api.openweathermap.org/data/2.5}
      APP_URL: ${APP_URL:-https://taarifa.live}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - exports_data:/app/exports

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
    container_name: taarifa_frontend
    restart: unless-stopped
    ports:
      - "5173:80"

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: taarifa_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx

volumes:
  mongo_data:
  redis_data:
  mqtt_data:
  mqtt_logs:
  exports_data:
  nginx_logs:
